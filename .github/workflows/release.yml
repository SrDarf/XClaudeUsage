name: release

# Builds and publishes the Rust binary that lives on the
# HighPerformanceXClaudeUsage branch of SrDarf/XClaudeUsage. This workflow file
# only exists on the HighPerformanceXClaudeUsage branch, so tags pushed against
# the upstream JS `main` branch don't carry it and won't trigger a build —
# binary releases stay scoped to this branch by construction.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          # x86_64-apple-darwin is intentionally omitted — GitHub's macos-13
          # runners are unreliable in practice (jobs sit pending indefinitely
          # while every other target finishes). Intel Mac users can
          # `cargo install --git ...` from the cargo install path documented
          # in README.md, or run the binary under Rosetta.
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64 linux only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        id: package
        shell: bash
        run: |
          name="xclaudeusage-${{ matrix.target }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            bin="target/${{ matrix.target }}/release/xclaudeusage.exe"
            7z a "${name}.zip" "$bin" >/dev/null
            echo "asset=${name}.zip" >> "$GITHUB_OUTPUT"
          else
            bin="target/${{ matrix.target }}/release/xclaudeusage"
            tar -C "$(dirname "$bin")" -czf "${name}.tar.gz" "$(basename "$bin")"
            echo "asset=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
